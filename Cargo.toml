[workspace]
members = [
    "synstream-core",
    "synstream-types",
    "synstream-macro",
    "synstream-converter",
    "examples/*",
    "bilateral-bench/synstream",
]
exclude = ["timely-bench", "tbb-bench", "taskflow-bench", "agent-bench/results"]
resolver = "3"

[profile.release]
opt-level = 3
debug = false 
lto = "thin"
codegen-units = 1
