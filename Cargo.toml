[workspace]
members = [
    "synstream-core",
    "synstream-types",
    "synstream-macro",
    "synstream-converter",
    "examples/*",
]
exclude = [
    # Pure-C example: no Rust source; built with Make, not Cargo.
    "examples/matrix-compute-C",
]
resolver = "3"

[profile.release]
opt-level = 3
debug = false 
lto = "thin"
codegen-units = 1
