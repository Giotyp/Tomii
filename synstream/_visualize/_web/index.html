<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SynStream Graph Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Top bar ──────────────────────────────────────────── */
  #topbar {
    background: #13151f;
    border-bottom: 1px solid #2d3148;
    padding: 0 14px;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    z-index: 20;
  }

  #topbar-title {
    font-size: 13px;
    font-weight: 700;
    color: #7c83fd;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-right: 4px;
  }

  #mode-badge {
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    margin-right: 8px;
  }
  .badge-view   { background: #1e293b; color: #64748b; }
  .badge-edit   { background: #1e3a5f; color: #60a5fa; }
  .badge-create { background: #14532d; color: #4ade80; }

  .sep { width: 1px; height: 22px; background: #2d3148; margin: 0 4px; }

  /* ── Buttons ──────────────────────────────────────────── */
  .btn {
    background: #1a1d27;
    border: 1px solid #2d3148;
    color: #94a3b8;
    padding: 5px 11px;
    border-radius: 5px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: #252840; color: #e2e8f0; border-color: #4a5568; }

  .btn-primary {
    background: #312e81;
    border-color: #7c83fd;
    color: #c7d2fe;
  }
  .btn-primary:hover { background: #3730a3; color: #fff; }

  .btn-success {
    background: #14532d;
    border-color: #4ade80;
    color: #86efac;
  }
  .btn-success:hover { background: #166534; color: #fff; }

  .btn-danger {
    background: #450a0a;
    border-color: #f87171;
    color: #fca5a5;
  }
  .btn-danger:hover { background: #7f1d1d; color: #fff; }

  .btn-active {
    background: #1e3a5f !important;
    border-color: #3b82f6 !important;
    color: #93c5fd !important;
  }

  /* ── Main area ────────────────────────────────────────── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────────── */
  #sidebar {
    width: 280px;
    min-width: 220px;
    background: #1a1d27;
    border-right: 1px solid #2d3148;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section {
    border-bottom: 1px solid #2d3148;
  }

  .sidebar-section-header {
    padding: 8px 14px;
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
  }
  .sidebar-section-header:hover { color: #94a3b8; }

  .sidebar-section-body {
    padding: 8px 14px;
  }

  /* Summary stats */
  .summary-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 3px 0;
    color: #94a3b8;
  }
  .summary-row span:last-child { color: #e2e8f0; font-weight: 600; }

  /* Detail panel */
  #detail-content { font-size: 12px; }
  .detail-empty   { color: #475569; font-style: italic; }

  .detail-field {
    display: flex;
    gap: 6px;
    padding: 4px 0;
    border-bottom: 1px solid #1e2130;
    font-size: 11.5px;
  }
  .detail-field-key { color: #64748b; min-width: 72px; flex-shrink: 0; }
  .detail-field-val { color: #e2e8f0; word-break: break-all; }

  /* Vars list */
  .var-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 11.5px;
    border-bottom: 1px solid #1e2130;
  }
  .var-item-name  { color: #93c5fd; font-weight: 600; }
  .var-item-value { color: #94a3b8; font-size: 11px; }
  .var-item-del   {
    color: #64748b; cursor: pointer; font-size: 14px;
    padding: 0 3px; display: none;
  }
  .var-item:hover .var-item-del { display: block; }
  .var-item-del:hover { color: #f87171; }

  /* Forms */
  .form-group {
    margin-bottom: 8px;
  }
  .form-label {
    display: block;
    font-size: 10px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }
  .form-input, .form-select {
    width: 100%;
    background: #0f1117;
    border: 1px solid #2d3148;
    color: #e2e8f0;
    padding: 5px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: #7c83fd;
  }
  .form-row { display: flex; gap: 6px; }
  .form-row .form-group { flex: 1; }

  /* Badge */
  .badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge-compute     { background: #166534; color: #bbf7d0; }
  .badge-conditional { background: #92400e; color: #fde68a; }
  .badge-post        { background: #374151; color: #d1d5db; }
  .badge-res         { background: #1e3a5f; color: #93c5fd; }
  .badge-dep         { background: #2d2d2d; color: #a1a1aa; }
  .badge-barrier     { background: #7c2d12; color: #fed7aa; }

  /* ── Canvas ──────────────────────────────────────────── */
  #cy-container {
    flex: 1;
    position: relative;
    background: #0f1117;
  }
  #cy { width: 100%; height: 100%; }

  /* ── Legend ──────────────────────────────────────────── */
  #legend {
    position: absolute;
    bottom: 14px;
    left: 14px;
    background: #1a1d27cc;
    backdrop-filter: blur(6px);
    border: 1px solid #2d3148;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 11px;
    z-index: 10;
  }
  #legend h4 {
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    font-size: 10px;
  }
  .legend-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; color: #94a3b8; }
  .legend-dot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .legend-line { width: 24px; height: 2px; flex-shrink: 0; }

  /* ── Modal ───────────────────────────────────────────── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #000000aa;
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal-overlay.visible { display: flex; }

  .modal {
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 10px;
    padding: 20px;
    min-width: 320px;
    max-width: 440px;
    width: 90%;
  }
  .modal h2 {
    font-size: 14px;
    color: #e2e8f0;
    margin-bottom: 14px;
  }
  .modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 14px;
  }

  /* ── Notification toast ──────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #1a1d27;
    border: 1px solid #2d3148;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #toast.show { opacity: 1; }
  #toast.toast-ok  { border-color: #4ade80; color: #86efac; }
  #toast.toast-err { border-color: #f87171; color: #fca5a5; }
</style>
</head>
<body>

<!-- Top toolbar -->
<div id="topbar">
  <span id="topbar-title">SynStream</span>
  <span id="mode-badge"></span>

  <!-- Edit-only controls -->
  <div id="edit-controls" style="display:none; gap:6px; align-items:center;">
    <button class="btn btn-primary" id="btn-add-node">+ Node</button>
    <button class="btn btn-primary" id="btn-add-var">+ Var</button>
    <button class="btn" id="btn-connect">⇢ Connect</button>
    <button class="btn btn-danger" id="btn-delete">✕ Delete</button>
    <div class="sep"></div>
  </div>

  <button class="btn" id="btn-fit">⊡ Fit</button>
  <button class="btn" id="btn-png">↓ PNG</button>

  <!-- Save/export controls -->
  <div id="save-controls" style="display:none; gap:6px; align-items:center; margin-left:4px;">
    <div class="sep"></div>
    <button class="btn btn-success" id="btn-save-json">💾 Save JSON</button>
    <button class="btn" id="btn-export-python">⬇ Export Python</button>
  </div>
</div>

<!-- Main content -->
<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">

    <!-- Stats -->
    <div class="sidebar-section">
      <div class="sidebar-section-header" style="cursor:default">Graph</div>
      <div class="sidebar-section-body">
        <div class="summary-row"><span>Nodes</span><span id="stat-nodes">–</span></div>
        <div class="summary-row"><span>Edges</span><span id="stat-edges">–</span></div>
        <div class="summary-row"><span>Variables</span><span id="stat-inits">–</span></div>
        <div class="summary-row" id="stat-post-row" style="display:none"><span>Post-nodes</span><span id="stat-posts">–</span></div>
      </div>
    </div>

    <!-- Variables section -->
    <div class="sidebar-section" id="vars-section">
      <div class="sidebar-section-header" id="vars-header">
        <span>Variables</span>
        <span id="vars-toggle-icon">▼</span>
      </div>
      <div class="sidebar-section-body" id="vars-body">
        <div id="vars-list">
          <p class="detail-empty">No variables defined.</p>
        </div>
      </div>
    </div>

    <!-- Detail / edit panel -->
    <div class="sidebar-section" style="flex:1; border-bottom:none;">
      <div class="sidebar-section-header" style="cursor:default">
        <span id="detail-title">Details</span>
      </div>
      <div class="sidebar-section-body">
        <div id="detail-content">
          <p class="detail-empty">Click a node or edge to inspect it.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Canvas -->
  <div id="cy-container">
    <div id="cy"></div>

    <div id="legend">
      <h4>Legend</h4>
      <div class="legend-row"><div class="legend-dot" style="background:#2e7d32;border:1px solid #4CAF50"></div>compute</div>
      <div class="legend-row"><div class="legend-dot" style="background:#e65100;border:2px dashed #FF9800"></div>conditional</div>
      <div class="legend-row"><div class="legend-dot" style="background:#424242;border:1px solid #9E9E9E"></div>post-node</div>
      <div class="legend-row" style="margin-top:5px">
        <div class="legend-line" style="background:#4a9eff"></div>$res
      </div>
      <div class="legend-row">
        <div class="legend-line" style="background:#555566;border-top:2px dashed #555566;height:0"></div>$dep
      </div>
      <div class="legend-row">
        <div class="legend-line" style="background:#FF5722;height:3px"></div>$barrier
      </div>
    </div>
  </div>
</div>

<!-- Edge-type modal (shown after drawing an edge) -->
<div id="modal-overlay">
  <div class="modal" id="edge-modal">
    <h2>Configure Edge</h2>
    <div class="form-group">
      <label class="form-label">Edge Type</label>
      <select class="form-select" id="edge-type-sel">
        <option value="res">$res — data dependency</option>
        <option value="dep">$dep — ordering only</option>
        <option value="barrier">$barrier — barrier sync</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Indexes <span style="color:#475569">(e.g. 0 · 0,1,2 · 0-num_nodes)</span></label>
      <input class="form-input" id="edge-indexes" value="0" />
    </div>
    <div class="form-group">
      <label class="form-label">Group By <span style="color:#475569">(optional)</span></label>
      <input class="form-input" id="edge-group-by" placeholder="leave blank for none" />
    </div>
    <div class="modal-footer">
      <button class="btn" id="edge-cancel">Cancel</button>
      <button class="btn btn-primary" id="edge-confirm">Add Edge</button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- CDN scripts -->
<script src="https://unpkg.com/cytoscape@3.31.0/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

<script>
// ── Injected by Python ─────────────────────────────────────────────────
const GRAPH_DATA   = {{GRAPH_DATA}};
const EDITOR_MODE  = "{{EDITOR_MODE}}";  // "view" | "edit" | "create"
const SAVE_PATH    = "{{SAVE_PATH}}";

// ── State ──────────────────────────────────────────────────────────────
let initVars = (GRAPH_DATA.init_vars || []).map(v => {
  const raw = v.raw || {};
  return { name: v.name, value: v.value, function: v.function, args: raw.args || [] };
});
let pendingEdgeSource = null;
let pendingEdgeTarget = null;
let connectModeActive = false;
let pendingConnectSource = null; // Cytoscape node selected as source in click-connect mode
let cy;

// ── Register plugins ───────────────────────────────────────────────────
try { cytoscape.use(cytoscapeDagre); } catch(e) {}

// ── Toast helper ───────────────────────────────────────────────────────
function toast(msg, isErr) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (isErr ? 'toast-err' : 'toast-ok');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.className = '', 2800);
}

// ── Stylesheet ─────────────────────────────────────────────────────────
const stylesheet = [
  { selector: 'node', style: {
    'shape': 'rectangle',
    'label': 'data(label)',
    'text-valign': 'center', 'text-halign': 'center',
    'font-family': '"Segoe UI", system-ui, sans-serif',
    'font-size': '11px', 'font-weight': '600',
    'color': '#ffffff',
    'text-wrap': 'wrap', 'text-max-width': '140px',
    'width': 'label', 'height': 'label', 'padding': '10px',
    'border-width': '1.5px', 'border-color': '#1a1d27',
    'background-color': '#2e7d32',
  }},
  { selector: 'node[kind="compute"]',     style: { 'background-color': '#2e7d32', 'border-color': '#4CAF50' }},
  { selector: 'node[kind="conditional"]', style: { 'background-color': '#e65100', 'border-color': '#FF9800', 'border-width': '2.5px', 'border-style': 'dashed' }},
  { selector: 'node[kind="post"]',        style: { 'background-color': '#424242', 'border-color': '#9E9E9E' }},
  { selector: 'node:selected',            style: { 'border-width': '3px', 'border-color': '#7c83fd', 'background-color': '#3730a3' }},
  { selector: 'edge[edge_type="res"]',    style: {
    'line-color': '#4a9eff', 'target-arrow-color': '#4a9eff', 'target-arrow-shape': 'triangle',
    'curve-style': 'bezier', 'width': 1.8,
    'label': 'data(indexes)',
    'font-size': '9px', 'color': '#4a9eff',
    'text-background-color': '#0f1117', 'text-background-opacity': 0.8, 'text-background-padding': '2px',
    'edge-text-rotation': 'autorotate',
  }},
  { selector: 'edge[edge_type="dep"]',    style: {
    'line-color': '#555566', 'target-arrow-color': '#555566', 'target-arrow-shape': 'vee',
    'curve-style': 'bezier', 'line-style': 'dashed', 'line-dash-pattern': [6,4], 'width': 1.2,
    'label': 'dep', 'font-size': '9px', 'color': '#666688',
    'text-background-color': '#0f1117', 'text-background-opacity': 0.8, 'text-background-padding': '2px',
    'edge-text-rotation': 'autorotate',
  }},
  { selector: 'edge[edge_type="barrier"]', style: {
    'line-color': '#FF5722', 'target-arrow-color': '#FF5722', 'target-arrow-shape': 'triangle',
    'curve-style': 'bezier', 'width': 2.8,
    'label': 'data(label)',
    'font-size': '9px', 'color': '#FF5722',
    'text-background-color': '#0f1117', 'text-background-opacity': 0.8, 'text-background-padding': '2px',
    'edge-text-rotation': 'autorotate',
  }},
  { selector: 'edge:selected', style: { 'line-color': '#7c83fd', 'target-arrow-color': '#7c83fd' }},
  // connect-source highlight
  { selector: '.connect-source', style: { 'border-width': '3px', 'border-color': '#f59e0b', 'background-color': '#78350f' }},
];

// ── Build elements from GRAPH_DATA ─────────────────────────────────────
function buildElements(data) {
  const elements = [];
  const nodeIds = new Set();

  (data.nodes || []).forEach(node => {
    nodeIds.add(node.id);
    // Extract non-edge args from raw (i.e. $ref and typed args — not $res/$dep/$barrier)
    const rawArgs = node.raw ? (node.raw.args || []) : [];
    const refArgs = rawArgs.filter(a => !a.predecessor);
    elements.push({ group: 'nodes', data: {
      id: node.id, label: node.label || node.id, kind: node.kind || 'compute',
      function: node.function || '', factor: node.factor || null,
      priority: node.priority || null, group_size: node.group_size || null,
      has_loop: node.has_loop || false, condition_summary: node.condition_summary || null,
      is_post: node.kind === 'post',
      _raw: node.raw || null,      // original SynStream JSON dict for round-trip
      _ref_args: refArgs,          // $ref + typed args (not predecessor-based edges)
    }});
  });

  const edgeSeen = new Set();
  (data.edges || []).forEach((edge, i) => {
    if (!nodeIds.has(edge.source) || !nodeIds.has(edge.target)) return;
    const key = `${edge.source}→${edge.target}→${edge.edge_type}→${edge.indexes}`;
    if (edgeSeen.has(key)) return;
    edgeSeen.add(key);
    const label = buildEdgeLabel(edge.edge_type, edge.indexes, edge.group_by);
    elements.push({ group: 'edges', data: {
      id: `e_${i}_${Date.now()}`,
      source: edge.source, target: edge.target,
      edge_type: edge.edge_type || 'res',
      label, indexes: edge.indexes || '0', group_by: edge.group_by || null,
    }});
  });

  return elements;
}

function buildEdgeLabel(type, indexes, groupBy) {
  let parts = [type];
  if (indexes && indexes !== '0') parts.push(`[${indexes}]`);
  if (groupBy) parts.push(`grp=${groupBy}`);
  return parts.join(' ');
}

// ── Argument row helpers ───────────────────────────────────────────────
const ARG_TYPES = ['$ref','usize','f64','String','bool','i32','i64','u32','u64','f32','Complex32','Complex64'];

function _argTypeOptions(selected) {
  return ARG_TYPES.map(t =>
    `<option value="${t}" ${t === selected ? 'selected' : ''}>${t}</option>`
  ).join('');
}

function renderArgRows(containerId, args) {
  const c = document.getElementById(containerId);
  if (!c) return;
  if (!args || args.length === 0) {
    c.innerHTML = '<p class="detail-empty" style="margin:2px 0 4px">No arguments.</p>';
    return;
  }
  c.innerHTML = args.map((a, i) => `
    <div class="arg-row" style="display:flex;gap:4px;margin-bottom:4px;align-items:center">
      <select class="form-select arg-type" style="width:88px;flex-shrink:0">${_argTypeOptions(a.type || '$ref')}</select>
      <input class="form-input arg-value" style="flex:1;min-width:0" value="${(a.value || '').replace(/"/g,'&quot;')}"
        placeholder="${(a.type || '') === '$ref' ? 'var name' : 'value'}" />
      <span style="cursor:pointer;color:#64748b;padding:0 4px;font-size:14px;flex-shrink:0"
        onclick="this.closest('.arg-row').remove()">✕</span>
    </div>`
  ).join('');
}

function addArgRow(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const empty = c.querySelector('.detail-empty');
  if (empty) empty.remove();
  const row = document.createElement('div');
  row.className = 'arg-row';
  row.style.cssText = 'display:flex;gap:4px;margin-bottom:4px;align-items:center';
  row.innerHTML = `
    <select class="form-select arg-type" style="width:88px;flex-shrink:0">${_argTypeOptions('$ref')}</select>
    <input class="form-input arg-value" style="flex:1;min-width:0" placeholder="var name" />
    <span style="cursor:pointer;color:#64748b;padding:0 4px;font-size:14px;flex-shrink:0"
      onclick="this.closest('.arg-row').remove()">✕</span>`;
  c.appendChild(row);
  // Update placeholder when type changes
  const sel = row.querySelector('.arg-type');
  const inp = row.querySelector('.arg-value');
  sel.addEventListener('change', () => {
    inp.placeholder = sel.value === '$ref' ? 'var name' : 'value';
  });
}

function collectArgs(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return [];
  return Array.from(c.querySelectorAll('.arg-row')).map(row => ({
    type:  row.querySelector('.arg-type').value,
    value: row.querySelector('.arg-value').value.trim(),
  })).filter(a => a.value !== '');
}

// ── Update sidebar stats ───────────────────────────────────────────────
function updateStats() {
  const allNodes = cy ? cy.nodes() : [];
  const computes = allNodes.filter(n => n.data('kind') !== 'post').length;
  const posts    = allNodes.filter(n => n.data('kind') === 'post').length;
  const edges    = cy ? cy.edges().length : 0;
  document.getElementById('stat-nodes').textContent = computes;
  document.getElementById('stat-edges').textContent = edges;
  document.getElementById('stat-inits').textContent = initVars.length;
  if (posts > 0) {
    document.getElementById('stat-post-row').style.display = 'flex';
    document.getElementById('stat-posts').textContent = posts;
  }
}

// ── Vars list ──────────────────────────────────────────────────────────
function renderVars() {
  const container = document.getElementById('vars-list');
  if (initVars.length === 0) {
    container.innerHTML = '<p class="detail-empty">No variables defined.</p>';
    return;
  }
  container.innerHTML = initVars.map((v, i) => {
    const valStr = v.function ? `${v.function}(…)` : (v.value !== null && v.value !== undefined ? `= ${v.value}` : '');
    const delBtn = (EDITOR_MODE !== 'view')
      ? `<span class="var-item-del" onclick="deleteVar(${i})">✕</span>`
      : '';
    return `<div class="var-item">
      <div>
        <span class="var-item-name">${v.name}</span>

      </div>
      ${delBtn}
    </div>`;
  }).join('');
  document.getElementById('stat-inits').textContent = initVars.length;
}

function toggleConnect() {
  if (!cy) { toast('Graph canvas not ready', true); return; }
  connectModeActive = !connectModeActive;
  const btn = document.getElementById('btn-connect');
  if (connectModeActive) {
    btn.classList.add('btn-active');
    document.getElementById('cy-container').style.cursor = 'crosshair';
    toast('Connect mode ON — click source node, then target node');
  } else {
    btn.classList.remove('btn-active');
    document.getElementById('cy-container').style.cursor = '';
    _clearConnectSource();
  }
}

function _clearConnectSource() {
  if (pendingConnectSource) {
    pendingConnectSource.removeClass('connect-source');
    pendingConnectSource = null;
  }
}

function _handleConnectTap(node) {
  if (!pendingConnectSource) {
    // First click — select source
    pendingConnectSource = node;
    node.addClass('connect-source');
    toast(`Source: ${node.id()} — now click target node`);
  } else if (pendingConnectSource.id() === node.id()) {
    // Clicked source again — deselect
    _clearConnectSource();
    toast('Source cleared');
  } else {
    // Second click — open edge modal
    pendingEdgeSource = pendingConnectSource;
    pendingEdgeTarget = node;
    _clearConnectSource();
    document.getElementById('edge-indexes').value = '0';
    document.getElementById('edge-group-by').value = '';
    document.getElementById('edge-type-sel').value = 'res';
    document.getElementById('modal-overlay').classList.add('visible');
  }
}

// ── Delete selected ────────────────────────────────────────────────────
function deleteSelected() {
  if (!cy) { toast('Graph canvas not ready', true); return; }
  const selected = cy.$(':selected');
  if (selected.length === 0) { toast('Select nodes or edges first', true); return; }

  const nodeCount = selected.filter('node').length;
  const edgeCount = selected.filter('edge').length;

  // Count edges that will be removed (connected to selected nodes)
  const affectedEdges = selected.filter('node').connectedEdges().length;
  const totalEdges = edgeCount + affectedEdges;

  const msg = nodeCount > 0
    ? `Delete ${nodeCount} node(s) and ${totalEdges} connected edge(s)?`
    : `Delete ${edgeCount} edge(s)?`;

  if (!confirm(msg)) return;

  selected.remove();
  resetDetail();
  updateStats();
  toast('Deleted');
}

// ── Export: Cytoscape → GraphFile JSON ────────────────────────────────
function exportToSynStreamJSON() {
  if (!cy) throw new Error('Graph canvas not ready');
  const nodes = [];
  const postNodes = [];

  cy.nodes().forEach(n => {
    const d = n.data();
    const raw = d._raw || {};  // original SynStream JSON dict (null for new nodes)

    // Build args: non-edge args first ($ref / typed), then edge-derived args.
    // _ref_args is authoritative (set on load from raw, or from the create-node form).
    const refArgs = d._ref_args || [];
    const edgeArgs = [];
    n.incomers('edge').forEach(e => {
      const ed = e.data();
      const pred = { name: ed.source, indexes: ed.indexes || '0' };
      if (ed.group_by) pred.group_by = ed.group_by;
      edgeArgs.push({ type: `$${ed.edge_type}`, predecessor: pred });
    });
    const args = [...refArgs, ...edgeArgs];

    // Start from a shallow copy of raw (preserves condition, loop, group_size, etc.)
    // then overlay the fields the user can edit in the UI.
    const nodeObj = Object.assign({}, raw, {
      name: d.id,
      function: d.function || raw.function || '',
      args,
    });

    // Overlay editable numeric/string fields
    if (d.factor) {
      nodeObj.factor = isNaN(d.factor) ? d.factor : Number(d.factor);
    } else {
      delete nodeObj.factor;
    }
    if (d.priority) {
      nodeObj.priority = d.priority;
    } else {
      delete nodeObj.priority;
    }

    // If the user changed kind away from conditional, drop the condition object
    const kind = d.kind || 'compute';
    if (kind !== 'conditional' && nodeObj.condition) delete nodeObj.condition;
    // If loop was removed (currently read-only, kept from raw)

    // Remove display-only fields that don't belong in the graph JSON
    delete nodeObj.label;
    delete nodeObj.condition_summary;

    if (d.is_post || kind === 'post') {
      postNodes.push(nodeObj);
    } else {
      nodes.push(nodeObj);
    }
  });

  // Build initializations from sidebar vars
  const initializations = initVars.map(v => {
    const entry = { name: v.name };
    if (v.function) {
      // Function-based var: use stored args (e.g. $ref references)
      entry.function = v.function;
      entry.args = v.args || [];
    } else {
      // Plain var: auto-type the value field
      entry.args = [];
      if (v.value !== null && v.value !== undefined && v.value !== '') {
        const n = Number(v.value);
        if (!isNaN(n)) {
          entry.args = [{ type: Number.isInteger(n) ? 'usize' : 'f64', value: v.value }];
        } else {
          entry.args = [{ type: 'String', value: v.value }];
        }
      }
    }
    return entry;
  });

  const graph = { initializations, nodes };
  if (postNodes.length) graph.post_nodes = postNodes;
  return graph;
}

// ── Save JSON ──────────────────────────────────────────────────────────
async function saveJSON() {
  try {
    const data = exportToSynStreamJSON();
    const resp = await fetch('/api/save-json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    const json = await resp.json();
    if (resp.ok) {
      toast('Saved to ' + (json.path || SAVE_PATH));
    } else {
      toast('Save failed: ' + (json.error || resp.status), true);
    }
  } catch(e) {
    toast('Save failed: ' + e.message, true);
  }
}

// ── Export Python ──────────────────────────────────────────────────────
async function exportPython() {
  try {
    const data = exportToSynStreamJSON();
    const resp = await fetch('/api/export-python', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    if (!resp.ok) {
      const json = await resp.json();
      toast('Export failed: ' + (json.error || resp.status), true);
      return;
    }
    const code = await resp.text();
    const blob = new Blob([code], { type: 'text/x-python' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'graph.py';
    a.click();
    toast('Downloaded graph.py');
  } catch(e) {
    toast('Export failed: ' + e.message, true);
  }
}

// ── Main ───────────────────────────────────────────────────────────────
(function main() {
  // Phase 1: DOM-only setup — never throws.
  const badge = document.getElementById('mode-badge');
  badge.textContent = EDITOR_MODE.toUpperCase();
  badge.className = 'badge-' + EDITOR_MODE;

  const isEditable = EDITOR_MODE !== 'view';
  document.getElementById('edit-controls').style.display = isEditable ? 'flex' : 'none';
  document.getElementById('save-controls').style.display = isEditable ? 'flex' : 'none';
  renderVars();

  // Phase 2: DOM event listeners — attached unconditionally before Cytoscape init.
  // Handlers that need `cy` guard internally so they show a toast on failure.

  document.getElementById('edge-confirm').addEventListener('click', () => {
    if (!cy || !pendingEdgeSource || !pendingEdgeTarget) return;
    const type    = document.getElementById('edge-type-sel').value;
    const indexes = document.getElementById('edge-indexes').value.trim() || '0';
    const groupBy = document.getElementById('edge-group-by').value.trim() || null;
    const label   = buildEdgeLabel(type, indexes, groupBy);
    cy.add({ group: 'edges', data: {
      id: `e_${Date.now()}`,
      source: pendingEdgeSource.id(),
      target: pendingEdgeTarget.id(),
      edge_type: type, indexes, group_by: groupBy, label,
    }});
    document.getElementById('modal-overlay').classList.remove('visible');
    pendingEdgeSource = null;
    pendingEdgeTarget = null;
    updateStats();
    toast(`Edge added ($${type})`);
  });

  document.getElementById('edge-cancel').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('visible');
    pendingEdgeSource = null;
    pendingEdgeTarget = null;
  });

  document.getElementById('btn-fit').addEventListener('click', () => { if (cy) cy.fit(40); });
  document.getElementById('btn-png').addEventListener('click', () => {
    if (!cy) { toast('Graph not loaded', true); return; }
    const png = cy.png({ scale: 2, bg: '#0f1117', full: true });
    const a = document.createElement('a');
    a.href = png; a.download = 'synstream-graph.png'; a.click();
  });

  if (isEditable) {
    document.getElementById('btn-add-node').addEventListener('click', showAddNodeForm);
    document.getElementById('btn-add-var').addEventListener('click', showAddVarForm);
    document.getElementById('btn-connect').addEventListener('click', toggleConnect);
    document.getElementById('btn-delete').addEventListener('click', deleteSelected);
    document.getElementById('btn-save-json').addEventListener('click', saveJSON);
    document.getElementById('btn-export-python').addEventListener('click', exportPython);
  }

  document.addEventListener('keydown', e => {
    if (isEditable && (e.key === 'Delete' || e.key === 'Backspace')) {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
      deleteSelected();
    }
    if (e.key === 'Escape') {
      if (connectModeActive) toggleConnect();  // exit connect mode
    }
  });

  document.getElementById('vars-header').addEventListener('click', () => {
    const body = document.getElementById('vars-body');
    const icon = document.getElementById('vars-toggle-icon');
    const collapsed = body.style.display === 'none';
    body.style.display = collapsed ? '' : 'none';
    icon.textContent = collapsed ? '▼' : '▶';
  });

  // Phase 3: Cytoscape init — wrapped so a CDN failure degrades gracefully
  // instead of killing the entire IIFE and leaving all buttons dead.
  try {
    const elements = buildElements(GRAPH_DATA);

    cy = cytoscape({
      container: document.getElementById('cy'),
      elements: elements,
      style: stylesheet,
      layout: elements.length > 0
        ? { name: 'dagre', rankDir: 'TB', rankSep: 80, nodeSep: 50, edgeSep: 20, padding: 40, animate: false }
        : { name: 'preset' },
      minZoom: 0.1, maxZoom: 4, wheelSensitivity: 0.3,
    });

    if (elements.length > 0) cy.fit(40);
    updateStats();

    // Cytoscape tap / hover events
    cy.on('tap', 'node', evt => {
      if (connectModeActive) {
        _handleConnectTap(evt.target);
      } else {
        showNodeDetail(evt.target.data());
      }
    });
    cy.on('tap', 'edge', evt => { if (!connectModeActive) showEdgeDetail(evt.target.data()); });
    cy.on('tap', evt => {
      if (evt.target === cy) {
        if (connectModeActive) { _clearConnectSource(); }
        else { resetDetail(); }
      }
    });
    cy.on('mouseover', 'node', evt => {
      if (connectModeActive) return;
      cy.elements().not(evt.target.neighborhood().add(evt.target)).style({ opacity: 0.3 });
    });
    cy.on('mouseout', 'node', () => { if (!connectModeActive) cy.elements().style({ opacity: 1 }); });
  } catch (cyErr) {
    console.error('Failed to initialize graph canvas:', cyErr);
    document.getElementById('cy').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;' +
      'color:#f87171;text-align:center;padding:20px"><div>' +
      '<div style="font-size:16px;margin-bottom:8px">Failed to load graph canvas</div>' +
      '<div style="font-size:12px;color:#94a3b8">Check your network connection and refresh the page</div>' +
      '</div></div>';
  }
})();
</script>
</body>
</html>
