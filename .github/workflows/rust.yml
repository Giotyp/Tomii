name: Verify SynStream Examples

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [matrix-compute]
        
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust repository
        uses: dtolnay/rust-toolchain@stable
      
      - name: Run Example
        working-directory: ./examples/${{ matrix.example }}
        run: ./run_bench.sh

      - name: Produce validation file
        working-directory: ./examples/${{ matrix.example }}
        run: cargo run --release -- --valid

      - name: Compare files
        working-directory: ./examples/${{ matrix.example }}
        run: diff -u result.txt validation.txt
