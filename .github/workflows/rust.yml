name: Verify Τομί Examples

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --lib -- -D warnings

      - name: Run unit tests
        run: cargo test

      - name: Build documentation
        run: cargo doc --no-deps

  verify:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        example: [matrix-compute, matrix-compute-C, mapreduce, stream-analytics]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install C library dependencies
        run: sudo apt-get install -y libfftw3-dev libopenblas-dev pkg-config

      - name: Run Example
        working-directory: ./examples/${{ matrix.example }}
        run: ./run_bench.sh

      - name: Produce validation file (matrix-compute)
        if: matrix.example == 'matrix-compute'
        working-directory: ./examples/${{ matrix.example }}
        run: cargo run --release

      - name: Compare files (matrix-compute)
        if: matrix.example == 'matrix-compute'
        working-directory: ./examples/${{ matrix.example }}
        run: diff -u result.txt validation.txt

      - name: Compare files (golden)
        if: matrix.example != 'matrix-compute'
        working-directory: ./examples/${{ matrix.example }}
        run: diff -u result.txt result.golden.txt
