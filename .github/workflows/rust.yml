name: Verify Τομί Examples

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # Bridge crate (workspace member) uses PyO3 — Python headers required.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --lib -- -D warnings

      - name: Run unit tests
        run: cargo test

      - name: Build documentation
        run: cargo doc --no-deps

  maturin-smoke:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install "maturin>=1.7,<2"

      - name: Build wheel
        run: maturin build --release

      - name: Verify wheel structure
        run: |
          python - <<'EOF'
          import zipfile, glob
          whl = glob.glob("target/wheels/*.whl")[0]
          names = [n for n in zipfile.ZipFile(whl).namelist() if not n.endswith("/")]
          so = [n for n in names if "tomii_python_bridge" in n and n.endswith(".so")]
          assert so, f"Bridge .so missing. Contents: {names}"
          assert so[0].startswith("tomii/_lib/"), f"Bridge at unexpected path: {so[0]}"
          print(f"OK: {so[0]}")
          EOF

  verify:
    runs-on: ubuntu-latest
    needs: check
    strategy:
      matrix:
        example: [matrix-compute, matrix-compute-C, mapreduce, stream-analytics]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install C library dependencies
        run: sudo apt-get install -y libfftw3-dev libopenblas-dev pkg-config

      - name: Run Example
        working-directory: ./examples/${{ matrix.example }}
        run: ./run_bench.sh

      - name: Produce validation file (matrix-compute)
        if: matrix.example == 'matrix-compute'
        working-directory: ./examples/${{ matrix.example }}
        run: cargo run --release

      - name: Compare files (matrix-compute)
        if: matrix.example == 'matrix-compute'
        working-directory: ./examples/${{ matrix.example }}
        run: diff -u result.txt validation.txt

      - name: Produce validation file (matrix-compute-C)
        if: matrix.example == 'matrix-compute-C'
        working-directory: ./examples/${{ matrix.example }}
        run: make validation && ./validation

      - name: Compare files (matrix-compute-C)
        if: matrix.example == 'matrix-compute-C'
        working-directory: ./examples/${{ matrix.example }}
        run: diff -u result.txt validation.txt

      - name: Compare files (golden)
        if: matrix.example == 'mapreduce' || matrix.example == 'stream-analytics'
        working-directory: ./examples/${{ matrix.example }}
        run: diff -u result.txt result.golden.txt
