name: Release

on:
  push:
    tags: ["v*"]

# OIDC token needed for PyPI trusted publishing (no stored API key required).
permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------------------------------- #
  # Build one wheel per (platform, Python) combination.
  #
  # Design note — binary bundling:
  #   `tomii-core --features embed-python` is compiled on the native runner so the
  #   binary and the bridge dylib share the same glibc/SDK version.  This avoids
  #   a manylinux-container mismatch: both artefacts are compatible by construction.
  #   The resulting Linux wheels are tagged for the runner's native glibc
  #   (ubuntu-22.04 → glibc 2.35 → manylinux_2_35+).  Broader glibc compatibility
  #   can be added later by building inside a manylinux_2_28 container.
  # --------------------------------------------------------------------------- #
  wheels:
    name: Wheel (${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-13
          - macos-14
          - windows-2022
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.13t"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # Free-threaded builds are opt-in for 3.13t
          allow-prereleases: true

      - name: Install maturin
        run: pip install "maturin>=1.7,<2"

      - name: Build tomii-core binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --features embed-python -p tomii-core --bin main
          cp target/release/main tomii/_bin/main

      - name: Build tomii-core binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cargo build --release --features embed-python -p tomii-core --bin main
          copy target\release\main.exe tomii\_bin\main.exe
        shell: cmd

      # maturin build without a manylinux container so the pre-built binary
      # (copied above) is accessible and glibc versions align.
      - name: Build wheel
        run: maturin build --release --out dist/

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.python }}
          path: dist/*.whl

  # --------------------------------------------------------------------------- #
  # Source distribution
  # --------------------------------------------------------------------------- #
  sdist:
    name: Source distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install "maturin>=1.7,<2"

      - name: Build sdist
        run: maturin sdist --out dist/

      - name: Smoke-build sdist in a clean environment
        run: |
          python -m venv /tmp/sdist-test-env
          /tmp/sdist-test-env/bin/pip install dist/*.tar.gz --no-build-isolation || true
          echo "sdist smoke build done (failure expected without Rust — verifies sdist unpacks)"

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # --------------------------------------------------------------------------- #
  # Publish all artefacts to PyPI via OIDC trusted publishing.
  # Requires a PyPI project with a trusted publisher configured for this repo.
  # --------------------------------------------------------------------------- #
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-22.04
    needs: [wheels, sdist]
    environment: pypi
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: List artefacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
